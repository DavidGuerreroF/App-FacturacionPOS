<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkControl - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }
        
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }
        
        .login-container h1 {
            text-align: center;
            color: #3498db;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.2);
        }
        
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(52, 152, 219, 0.3);
        }
        
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: none;
            color: #95a5a6;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            color: #3498db;
            border-bottom-color: #3498db;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border-left: 4px solid #e74c3c;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border-left: 4px solid #2ecc71;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1><i class="fas fa-parking"></i> ParkControl</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarTab('login')">Login</button>
            <button class="tab-btn" onclick="cambiarTab('registrar')">Registrarse</button>
        </div>
        
        <!-- ALERTAS -->
        <div id="alerta" class="alert"></div>
        
        <!-- TAB LOGIN -->
        <div id="tab-login" class="tab-content active">
            <form id="formLogin" onsubmit="manejarLogin(event)">
                <div class="form-group">
                    <label for="emailLogin">Email</label>
                    <input type="email" id="emailLogin" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="passwordLogin">Contraseña</label>
                    <input type="password" id="passwordLogin" required placeholder="••••••">
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Ingresar
                </button>
            </form>
        </div>
        
        <!-- TAB REGISTRAR -->
        <div id="tab-registrar" class="tab-content">
            <form id="formRegistrar" onsubmit="manejarRegistrar(event)">
                <div class="form-group">
                    <label for="nombreRegistrar">Nombre Completo</label>
                    <input type="text" id="nombreRegistrar" required placeholder="Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="emailRegistrar">Email</label>
                    <input type="email" id="emailRegistrar" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="passwordRegistrar">Contraseña</label>
                    <input type="password" id="passwordRegistrar" required placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="passwordConfirm">Confirmar Contraseña</label>
                    <input type="password" id="passwordConfirm" required placeholder="Confirma tu contraseña">
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-user-plus"></i> Registrarse
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Cambiar entre tabs
        function cambiarTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
        }

        // Mostrar alerta
        function mostrarAlerta(mensaje, tipo) {
            const alerta = document.getElementById('alerta');
            alerta.textContent = mensaje;
            alerta.className = `alert show alert-${tipo}`;
            
            if (tipo === 'success') {
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        // Manejar login
        async function manejarLogin(e) {
            e.preventDefault();

            const email = document.getElementById('emailLogin').value;
            const password = document.getElementById('passwordLogin').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    mostrarAlerta(data.error || 'Error al ingresar', 'error');
                    return;
                }

                // Guardar token
                localStorage.setItem('token', data.token);
                localStorage.setItem('usuario', JSON.stringify(data.usuario));

                mostrarAlerta('✅ Login exitoso. Redirigiendo...', 'success');

            } catch (error) {
                mostrarAlerta('Error de conexión', 'error');
            }
        }

        // Manejar registro
        async function manejarRegistrar(e) {
            e.preventDefault();

            const nombre = document.getElementById('nombreRegistrar').value;
            const email = document.getElementById('emailRegistrar').value;
            const password = document.getElementById('passwordRegistrar').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;

            if (password !== passwordConfirm) {
                mostrarAlerta('Las contraseñas no coinciden', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/registrar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    mostrarAlerta(data.error || 'Error al registrar', 'error');
                    return;
                }

                mostrarAlerta('✅ Registro exitoso. Ahora puedes ingresar', 'success');
                document.getElementById('formRegistrar').reset();
                cambiarTab('login');

            } catch (error) {
                mostrarAlerta('Error de conexión', 'error');
            }
        }

        // Verificar si ya hay sesión
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
